<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Decision Oracle 🔮</title>
<style>
    body {
        margin: 0;
        font-family: 'Segoe UI', sans-serif;
        background: radial-gradient(circle at center, #1a1a2e, #0f0f1a);
        color: white;
        text-align: center;
    }

    h1 {
        margin-top: 30px;
        font-size: 2.5em;
    }

    .orb {
        width: 200px;
        height: 200px;
        margin: 30px auto;
        border-radius: 50%;
        background: radial-gradient(circle, #6a00ff, #000);
        box-shadow: 0 0 40px #6a00ff;
        animation: pulse 2s infinite;
    }

    @keyframes pulse {
        0% { box-shadow: 0 0 20px #6a00ff; }
        50% { box-shadow: 0 0 60px #a64dff; }
        100% { box-shadow: 0 0 20px #6a00ff; }
    }

    input {
        padding: 10px;
        width: 60%;
        border-radius: 8px;
        border: none;
        margin-top: 10px;
    }

    button {
        padding: 10px 20px;
        margin-top: 10px;
        border: none;
        border-radius: 8px;
        background-color: #6a00ff;
        color: white;
        cursor: pointer;
        font-size: 1em;
    }

    select {
        margin-top: 10px;
        padding: 5px;
        border-radius: 5px;
    }

    .result {
        margin-top: 20px;
        font-size: 1.3em;
        min-height: 60px;
    }

    .confidence {
        font-size: 0.9em;
        color: #ccc;
    }
</style>
</head>
<body>

<h1>🔮 Decision Oracle</h1>

<div class="orb"></div>

<input type="text" id="question" placeholder="Ask your question..."><br>

<select id="mode">
    <option value="mystic">Mystic</option>
    <option value="chaotic">Chaotic</option>
    <option value="sarcastic">Sarcastic</option>
</select><br>

<button onclick="askOracle()">Consult the Oracle</button>

<div class="result" id="answer"></div>
<div class="confidence" id="confidence"></div>

<script>
const responses = {
    mystic: [
        "The stars align in your favor.",
        "Dark clouds linger... proceed carefully.",
        "The answer lies within you.",
        "Yes, but only if you act soon.",
        "Fate is uncertain."
    ],
    chaotic: [
        "ABSOLUTELY YES 🔥",
        "nah lol",
        "flip a coin honestly",
        "42",
        "run. just run."
    ],
    sarcastic: [
        "Oh yeah, totally 🙄",
        "Because that always works out...",
        "Sure, what could go wrong?",
        "I mean… if you like bad ideas.",
        "Go for it. I dare you."
    ]
};

function askOracle() {
    const question = document.getElementById("question").value;
    const mode = document.getElementById("mode").value;

    if (!question) {
        document.getElementById("answer").innerText = "Ask something first.";
        return;
    }

    const randomIndex = Math.floor(Math.random() * responses[mode].length);
    const answer = responses[mode][randomIndex];

    const confidence = Math.floor(Math.random() * 100) + 1;

    document.getElementById("answer").innerText = answer;
    document.getElementById("confidence").innerText = "Confidence: " + confidence + "%";
}
</script>

</body>
</html>
